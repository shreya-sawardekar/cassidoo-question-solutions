<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Perrin numbers</title>
    </head>
    <body>
        <!--
	Given an integer `n`, return all unique combinations of
	Perrin numbers (up to and including the `n`th Perrin number)
	that sum to a target value `k`, where each Perrin number can
	be used at most once. Return the combinations sorted in
	ascending order.

	> perrinCombinations(7, 12) [[0,2,3,7],[0,5,7],[2,3,7],[5,7]]
	> perrinCombinations(6, 5) [[0,2,3],[0,5],[2,3],[5]]
	-->

        <!-- Perrin Numbers
    	p(0) = 3   p(4) = 2
    	p(1) = 0   p(5) = 5
    	p(2) = 2   p(6) = 5
    	p(3) = 3   p(7) = 7

    	p(n) = p(n-2)+p(n-3)

	-->

        <script>
            const perrinCombinations = (n, k) => {
                // first get all perrin numbers till n
                const arrPerrinNum = [];
                for (let i = 0; i <= n; i++) {
                    if (i === 0) {
                        arrPerrinNum.push(3);
                    } else if (i === 1) {
                        arrPerrinNum.push(0);
                    } else if (i === 2) {
                        arrPerrinNum.push(2);
                    } else {
                        const sum = arrPerrinNum[i - 2] + arrPerrinNum[i - 3];
                        arrPerrinNum.push(sum);
                    }
                }
                // console.log(arrPerrinNum);

                // keep only unique numbers
                const uniqueArr = [...new Set(arrPerrinNum)].sort(
                    (a, b) => a - b,
                );

                // get sum as k
                const finalArr = [];

                const stack = (start, current, remaining) => {
                    if (remaining === 0) {
                        finalArr.push([...current]);
                        return;
                    }

                    for (let i = start; i < uniqueArr.length; i++) {
                        if (uniqueArr[i] > remaining) break;

                        current.push(uniqueArr[i]);
                        stack(i + 1, current, remaining - uniqueArr[i]);
                        current.pop();
                    }
                };

                stack(0, [], k);
                return finalArr;
            };

            console.log(perrinCombinations(6, 5));
            console.log(perrinCombinations(7, 12));
        </script>
    </body>
</html>
