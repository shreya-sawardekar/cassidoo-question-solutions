<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mean Numbers</title>
    </head>
    <body>
        <!--Given a positive integer `n`, calculate the mean number of bits required to represent all integers from 0 to n-1 (where the bit count of 0 is 1). Return the result rounded to two decimal places.
        > meanBits(6) > 2.00
        // Explanation // 0: 1 bit, 1: 1 bit, 2: 2 bits, 3: 2 bits, 4: 3 bits, 5: 3 bits // Mean = (1 + 1 + 2 + 2 + 3 + 3) / 6 = 2.00
        -->
        <script>
            const meanBits = (n) => {
                let total = 0;
                for (let i = 0; i <= n - 1; i++) {
                    total += i.toString(2).length;
                }

                const mean = total / n;
                return Math.round(mean * 100) / 100;
            };

            console.log(meanBits(6));
        </script>
    </body>
</html>
