<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Solitaire</title>
    </head>
    <body>
        <!--
            You have a "mini" version of solitaire in front of you. There is a row of cards, where each card has a rank from 1 to 13 and a color of "red" or "black". In one move, you may place a card onto another card immediately to its left if its rank is exactly one less and its color is opposite, then remove the moved card from its original position. Return the maximum number of valid moves you can make by repeatedly scanning left to right.

            const cards = [ { rank: 7, color: "black" }, { rank: 6, color: "red" }, { rank: 5, color: "black" }, { rank: 9, color: "red" } ]; const cards2 = [ { rank: 8, color: "black" }, { rank: 7, color: "red" }, { rank: 6, color: "red" }, { rank: 5, color: "black" } ];
            maxSolitaireMoves(cards) > 2 // 6 onto 7, 5 onto 6
            maxSolitaireMoves(cards2) > 2 // 7 onto 8, 5 onto 6
        -->
        <script>
            const maxSolitaireMoves = (cards) => {
                let count = 0;
                let moved = true;
                while (moved) {
                    moved = false;
                    for (let i = 0; i < cards.length - 1; i++) {
                        if (
                            cards[i + 1].color !== cards[i].color &&
                            cards[i].rank - cards[i + 1].rank === 1
                        ) {
                            count++;
                            cards.splice(i, 1);
                            moved = true;
                            break;
                        }
                    }
                }
                console.log(count);
                return count;
            };

            const cards = [
                { rank: 7, color: "black" },
                { rank: 6, color: "red" },
                { rank: 5, color: "black" },
                { rank: 9, color: "red" },
            ];
            maxSolitaireMoves(cards);

            const cards2 = [
                { rank: 8, color: "black" },
                { rank: 7, color: "red" },
                { rank: 6, color: "red" },
                { rank: 5, color: "black" },
            ];
            maxSolitaireMoves(cards2);
        </script>
    </body>
</html>
