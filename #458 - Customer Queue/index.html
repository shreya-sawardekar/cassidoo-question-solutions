<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Customer Queue</title>
    </head>
    <body>
        <!--
            Given a queue of customer names and an integer `n`, move every `n`th customer to the end of the line while preserving relative order otherwise.

            shuffleLine(["Ada", "Ben", "Cam", "Diya", "Eli", "Fay"], 3); > ['Ada', 'Ben', 'Diya', 'Eli', 'Cam', 'Fay'] // Every 3rd customer is moved to the end, so "Cam" and "Fay" // are moved after the others, preserving their original order.
            shuffleLine(["A", "B", "C", "D", "E"], 2); > ['A', 'C', 'E', 'B', 'D']
            shuffleLine(["Mo", "Noah", "Oli"], 1); > ['Mo', 'Noah', 'Oli']
        -->
    </body>

    <script>
        const shuffleLine = (customerQueue, n) => {
            const oddArray = [];
            const evenArray = [];

            for (let i = 0; i < customerQueue.length; i++) {
                if ((i + 1) % n === 0) {
                    evenArray.push(customerQueue[i]);
                } else {
                    oddArray.push(customerQueue[i]);
                }
            }
            console.log([...oddArray, ...evenArray]);
        };

        shuffleLine(["Ada", "Ben", "Cam", "Diya", "Eli", "Fay"], 3);
        shuffleLine(["A", "B", "C", "D", "E"], 2); //['A', 'C', 'E', 'B', 'D']
        shuffleLine(["Mo", "Noah", "Oli"], 1);
    </script>
</html>
